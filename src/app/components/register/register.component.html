<!-- Tela de cadastro de usuário com Bootstrap e validação -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <form [formGroup]="form" (ngSubmit)="onRegister()" aria-label="Cadastro de usuário">
        <h2 class="mb-4 text-center">Cadastro</h2>
        <div class="mb-3">
          <label for="name" class="form-label">Nome</label>
          <input type="text" id="name" class="form-control" formControlName="name" />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-control" formControlName="email" />
        </div>
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" id="username" class="form-control" formControlName="username" />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Senha</label>
          <input type="password" id="password" class="form-control" formControlName="password" />
        </div>
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar Senha</label>
          <input type="password" id="confirmPassword" class="form-control" formControlName="confirmPassword" />
        </div>
        <button  (click)="redirectToLogin()" type="submit" class="btn btn-success w-100" [disabled]!="!form.valid">Cadastrar</button>
        @if (error()) {
          <div class="alert alert-danger mt-3" role="alert">
            {{ error() }}
          </div>
        }
        @if (success()) {
          <div class="alert alert-success mt-3" role="alert">
            {{ success() }}
          </div>
        }
      </form>
      <div class="mt-3 text-center">
        <a (click)="redirectToLogin()" class="btn btn-link">Voltar para Login</a>
      </div>
    </div>
  </div>
</div>
