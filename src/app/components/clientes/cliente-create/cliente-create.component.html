<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header bg-primary text-white">
      <h4 class="mb-0">Cadastro de Cliente</h4>
    </div>

    <div class="card-body">

      <form [formGroup]="clientForm" (ngSubmit)="saveClient()">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label class="form-label">Nome</label>
            <input
              type="text"
              class="form-control"
              formControlName="name"
              placeholder="Digite o nome do cliente"
            />

            <div class="text-danger" *ngIf="clientForm.get('name')?.invalid && clientForm.get('name')?.touched">
              Nome é obrigatório
            </div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              formControlName="email"
              placeholder="email@empresa.com"
            />

            <div class="text-danger" *ngIf="clientForm.get('email')?.invalid && clientForm.get('email')?.touched">
              Email inválido
            </div>
          </div>

        </div>


        <div class="row">

          <div class="col-md-6 mb-3">
            <label class="form-label">Telefone</label>
            <input
              type="text"
              class="form-control"
              formControlName="phone"
              placeholder="(11) 99999-9999"
            />
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Empresa</label>
            <input
              type="text"
              class="form-control"
              formControlName="company"
              placeholder="Nome da empresa"
            />
          </div>

        </div>

        <div class="mb-3">
          <label class="form-label">Observações</label>
          <textarea
            class="form-control"
            rows="3"
            formControlName="notes"
          ></textarea>
        </div>


        <div class="d-flex justify-content-end gap-2">

          <button
            type="button"
            class="btn btn-secondary"
            routerLink="/clients"
          >
            Cancelar
          </button>

          <button
            type="submit"
            class="btn btn-success"
            [disabled]="clientForm.invalid"
          >
            Salvar Cliente
          </button>

        </div>

      </form>

    </div>

  </div>

</div>
