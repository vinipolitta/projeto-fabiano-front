<div class="container mt-3">
  <h3>Formulários Disponíveis</h3>

  <!-- Lista de templates -->
  <ul class="list-group mb-3">
    <li *ngFor="let t of templates"
        class="list-group-item"
        (click)="onTemplateSelect(t)"
        [class.active]="selectedTemplate?.id === t.id">
      {{ t.name }}
    </li>
  </ul>

  <!-- Formulário dinâmico: só aparece se houver template selecionado -->
  <form [formGroup]="formGroup" *ngIf="selectedTemplate" (ngSubmit)="submit()">
    <div *ngFor="let f of selectedTemplate.fields" class="mb-2">
      <label>{{ f.label }}</label>
      <input [type]="f.type"
             class="form-control"
             [formControlName]="f.label"
             [required]="f.required">
    </div>
    <button class="btn btn-primary mt-2" type="submit">Enviar</button>
  </form>

  <!-- Botão para acessar a lista de formulários preenchidos -->
  <button class="btn btn-secondary mt-3"
          [disabled]="!selectedTemplateId"
          (click)="goToList()">
    Lista forms preenchidos
  </button>
</div>
