<!-- CRUD de usuários -->
<div class="container mt-5">
  <h2 class="mb-4">Usuários</h2>
  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }
  <button class="btn btn-primary" (click)="voltarToHome()">voltar</button>

  <table class="table table-bordered table-hover">
    <thead class="table-light">
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Username</th>
        <th>Role</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (user of users(); track user.id) {
        <tr>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.role }}</td>
          <td>
            <button class="btn btn-sm btn-warning me-2" (click)="editUser(user)">Editar</button>
            <button class="btn btn-sm btn-danger" (click)="deleteUser(user.id)">Excluir</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
