<!-- Tela de login com Bootstrap -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" aria-label="Login form">
        <h2 class="mb-4 text-center">Login</h2>
        <div class="mb-3">
          <label for="username" class="form-label">Usuário</label>
          <input type="text" id="username" class="form-control" formControlName="username" autofocus />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Senha</label>
          <input type="password" id="password" class="form-control" formControlName="password" />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]!="!form.valid">Entrar</button>
        @if (error()) {
          <div class="alert alert-danger mt-3" role="alert">
            {{ error() }}
          </div>
        }
      </form>
      <div class="mt-3 text-center">
        <a (click)="redirectToAddNewUser()" class="btn btn-link">Cadastrar novo usuário</a>
      </div>
    </div>
  </div>
</div>
